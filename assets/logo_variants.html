<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Logo Variants</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #111; font-family: -apple-system, sans-serif; padding: 48px; }
    h1 { color: #555; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
    .card {
      background: #1a1a1a;
      border-radius: 20px;
      padding: 36px 20px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      border: 1px solid #222;
    }
    .card:hover { border-color: #444; }
    .label { font-size: 10px; color: #444; letter-spacing: 2px; text-transform: uppercase; }
  </style>
</head>
<body>
<h1>Pick a shape</h1>
<div class="grid">

  <!-- 1. Single tapered arc — asymmetric, gradient -->
  <div class="card">
    <svg viewBox="0 0 48 48" width="100" height="100">
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#a855f7"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
      </defs>
      <!-- 300° arc, gap at bottom-right, tapered via stroke-width trick using two overlapping arcs -->
      <path d="M 9.5 38 A 20 20 0 1 1 38 38.5"
            fill="none" stroke="url(#g1)" stroke-width="5" stroke-linecap="round"/>
      <path d="M 9.5 38 A 20 20 0 1 1 38 38.5"
            fill="none" stroke="url(#g1)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
    </svg>
    <span class="label">1 · Arc</span>
  </div>

  <!-- 2. Triskelion — three rotating arms -->
  <div class="card">
    <svg viewBox="0 0 48 48" width="100" height="100">
      <defs>
        <linearGradient id="g2" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f97316"/>
          <stop offset="100%" stop-color="#ec4899"/>
        </linearGradient>
      </defs>
      <g fill="none" stroke="url(#g2)" stroke-width="3" stroke-linecap="round">
        <!-- Arm 1: up -->
        <path d="M 24 24 C 24 18, 30 10, 24 6"/>
        <!-- Arm 2: down-right -->
        <path d="M 24 24 C 29.2 27, 38 26, 40.4 19.2" transform="rotate(120 24 24)"/>
        <!-- Arm 3: down-left -->
        <path d="M 24 24 C 29.2 27, 38 26, 40.4 19.2" transform="rotate(240 24 24)"/>
      </g>
      <circle cx="24" cy="24" r="3.5" fill="url(#g2)"/>
    </svg>
    <span class="label">2 · Triskelion</span>
  </div>

  <!-- 3. Stacked bars — EQ-style, gradient fills -->
  <div class="card">
    <svg viewBox="0 0 48 48" width="100" height="100">
      <defs>
        <linearGradient id="g3a" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#818cf8"/><stop offset="100%" stop-color="#4338ca"/>
        </linearGradient>
        <linearGradient id="g3b" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c3aed"/>
        </linearGradient>
        <linearGradient id="g3c" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="#c4b5fd"/><stop offset="100%" stop-color="#8b5cf6"/>
        </linearGradient>
      </defs>
      <rect x="7"  y="16" width="9" height="25" rx="4.5" fill="url(#g3a)"/>
      <rect x="20" y="8"  width="9" height="33" rx="4.5" fill="url(#g3b)"/>
      <rect x="33" y="20" width="9" height="21" rx="4.5" fill="url(#g3c)"/>
    </svg>
    <span class="label">3 · Bars</span>
  </div>

  <!-- 4. Broken circle — 3 arc segments with gaps -->
  <div class="card">
    <svg viewBox="0 0 48 48" width="100" height="100">
      <defs>
        <linearGradient id="g4a" x1="0" y1="0" x2="48" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#fb923c"/>
        </linearGradient>
      </defs>
      <g fill="none" stroke-width="4" stroke-linecap="round">
        <!-- Arc segment 1 (top, 100°) -->
        <path d="M 10.2 32 A 18 18 0 0 1 37.8 32" stroke="#f472b6"/>
        <!-- Arc segment 2 (bottom-right, 100°) -->
        <path d="M 37.8 32 A 18 18 0 0 1 24 6.5" stroke="#a855f7" opacity="0.75"/>
        <!-- Arc segment 3 (bottom-left, 100°) -->
        <path d="M 24 6.5 A 18 18 0 0 1 10.2 32" stroke="#06b6d4" opacity="0.55"/>
      </g>
    </svg>
    <span class="label">4 · Segments</span>
  </div>

  <!-- 5. Chevrons pointing right -->
  <div class="card">
    <svg viewBox="0 0 48 48" width="100" height="100">
      <defs>
        <linearGradient id="g5" x1="0" y1="0" x2="48" y2="0" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#34d399"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
      </defs>
      <g fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M 8 14 L 20 24 L 8 34"  stroke="url(#g5)" stroke-width="4"/>
        <path d="M 19 14 L 31 24 L 19 34" stroke="url(#g5)" stroke-width="4" opacity="0.6"/>
        <path d="M 30 14 L 42 24 L 30 34" stroke="url(#g5)" stroke-width="4" opacity="0.3"/>
      </g>
    </svg>
    <span class="label">5 · Chevrons</span>
  </div>

  <!-- 6. Asterisk — 6 arms, rounded, gradient -->
  <div class="card">
    <svg viewBox="0 0 48 48" width="100" height="100">
      <defs>
        <linearGradient id="g6" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#fb923c"/>
          <stop offset="50%" stop-color="#f43f5e"/>
          <stop offset="100%" stop-color="#a855f7"/>
        </linearGradient>
      </defs>
      <g stroke="url(#g6)" stroke-width="4" stroke-linecap="round">
        <line x1="24" y1="6"  x2="24" y2="42"/>
        <line x1="24" y1="6"  x2="24" y2="42" transform="rotate(60 24 24)"/>
        <line x1="24" y1="6"  x2="24" y2="42" transform="rotate(120 24 24)"/>
      </g>
      <circle cx="24" cy="24" r="4" fill="#0d0d0d"/>
      <circle cx="24" cy="24" r="2.5" fill="url(#g6)"/>
    </svg>
    <span class="label">6 · Asterisk</span>
  </div>

  <!-- 7. Crystalline — irregular faceted polygon -->
  <div class="card">
    <svg viewBox="0 0 48 48" width="100" height="100">
      <defs>
        <linearGradient id="g7a" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#38bdf8"/><stop offset="100%" stop-color="#818cf8"/>
        </linearGradient>
      </defs>
      <!-- Outer gem shape -->
      <polygon points="24,4 40,14 42,32 24,44 6,32 8,14"
               fill="none" stroke="url(#g7a)" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- Inner facets -->
      <line x1="24" y1="4"  x2="24" y2="44" stroke="url(#g7a)" stroke-width="0.8" opacity="0.4"/>
      <line x1="8"  y1="14" x2="42" y2="32" stroke="url(#g7a)" stroke-width="0.8" opacity="0.4"/>
      <line x1="40" y1="14" x2="6"  y2="32" stroke="url(#g7a)" stroke-width="0.8" opacity="0.4"/>
      <!-- Highlight vertices -->
      <circle cx="24" cy="4"  r="2" fill="#38bdf8"/>
      <circle cx="40" cy="14" r="1.5" fill="#818cf8" opacity="0.8"/>
      <circle cx="42" cy="32" r="1.5" fill="#818cf8" opacity="0.6"/>
    </svg>
    <span class="label">7 · Crystal</span>
  </div>

  <!-- 8. Flowing S-curve ribbon -->
  <div class="card">
    <svg viewBox="0 0 48 48" width="100" height="100">
      <defs>
        <linearGradient id="g8" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#fbbf24"/>
          <stop offset="50%" stop-color="#f97316"/>
          <stop offset="100%" stop-color="#ef4444"/>
        </linearGradient>
      </defs>
      <!-- Bold S-curve -->
      <path d="M 10 40 C 10 28, 38 28, 38 16 C 38 8, 24 4, 16 8"
            fill="none" stroke="url(#g8)" stroke-width="5" stroke-linecap="round"/>
      <!-- Thin echo -->
      <path d="M 10 40 C 10 28, 38 28, 38 16 C 38 8, 24 4, 16 8"
            fill="none" stroke="url(#g8)" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
      <circle cx="16" cy="8"  r="3" fill="#fbbf24"/>
      <circle cx="10" cy="40" r="3" fill="#ef4444"/>
    </svg>
    <span class="label">8 · Ribbon</span>
  </div>

  <!-- 9. Concentric incomplete rings (offset gaps) -->
  <div class="card">
    <svg viewBox="0 0 48 48" width="100" height="100">
      <defs>
        <linearGradient id="g9" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#4ade80"/>
          <stop offset="100%" stop-color="#06b6d4"/>
        </linearGradient>
      </defs>
      <g fill="none" stroke-linecap="round">
        <!-- Outer ring — gap at bottom-right -->
        <path d="M 35.3 35.3 A 16 16 0 1 1 35.3 35.3" stroke="#4ade80" stroke-width="2.5" stroke-dasharray="88 12"/>
        <!-- Middle ring — gap at top-left, rotated -->
        <path d="M 24 10 A 14 14 0 1 1 24 10" stroke="#22d3ee" stroke-width="2.5"
              stroke-dasharray="76 12" transform="rotate(135 24 24)" opacity="0.75"/>
        <!-- Inner ring — gap at left -->
        <path d="M 24 12 A 12 12 0 1 1 24 12" stroke="#818cf8" stroke-width="2.5"
              stroke-dasharray="64 12" transform="rotate(270 24 24)" opacity="0.5"/>
      </g>
    </svg>
    <span class="label">9 · Rings</span>
  </div>

  <!-- 10. Three diamonds — stacked, offset -->
  <div class="card">
    <svg viewBox="0 0 48 48" width="100" height="100">
      <defs>
        <linearGradient id="g10" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#e879f9"/>
          <stop offset="50%" stop-color="#818cf8"/>
          <stop offset="100%" stop-color="#38bdf8"/>
        </linearGradient>
      </defs>
      <!-- Diamond 1 (large, center) -->
      <polygon points="24,6 38,24 24,42 10,24"
               fill="none" stroke="url(#g10)" stroke-width="1.8" stroke-linejoin="round"/>
      <!-- Diamond 2 (medium, upper-right offset) -->
      <polygon points="28,10 38,20 28,30 18,20"
               fill="none" stroke="url(#g10)" stroke-width="1.2" stroke-linejoin="round" opacity="0.55"/>
      <!-- Diamond 3 (small inner) -->
      <polygon points="24,16 31,24 24,32 17,24"
               fill="url(#g10)" opacity="0.2"/>
      <polygon points="24,16 31,24 24,32 17,24"
               fill="none" stroke="url(#g10)" stroke-width="1" stroke-linejoin="round" opacity="0.8"/>
    </svg>
    <span class="label">10 · Diamonds</span>
  </div>

</div>
</body>
</html>
