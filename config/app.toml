[display]
date_format             = "%B %-d, %Y"
para_truncate_len       = 80
allowed_filetypes       = ["docx", "doc"]
closed_date_offset_days = 1

[chart]
marker_size                 = 10
marker_opacity              = 0.75
bar_height_per_row          = 50
bar_height_base             = 60
timeline_height_per_author  = 60
timeline_height_base        = 120
card_height                 = 120

[multi_doc_search]
min_para_chars = 30
bm25_k1        = 1.5
bm25_b         = 0.75

[topic]
min_passages         = 12
static_map_threshold = 6
umap_min_dist        = 0.05

[time_bin]
day_max_days  = 30
week_max_days = 180

[pages.document_statistics.tabs]
main          = ["Comments", "Redlines", "Moves"]
comment_views = ["Counts", "Timeline"]
redline_views = ["Counts", "Timeline"]
move_views    = ["Counts", "Timeline"]
